<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CyberShield Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1A1A2E;
            --surface: rgba(255, 255, 255, 0.05);
            --surface2: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.15);
            --green: #2ED573;
            --blue: #1E90FF;
            --purple: #9B59B6;
            --pink: #FF6B81;
            --text: #F1F2F6;
            --text2: #DFE4EA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(155, 89, 182, 0.2), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(30, 144, 255, 0.2), transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(46, 213, 115, 0.1), transparent 60%);
            background-attachment: fixed;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: rgba(25, 30, 60, 0.6);
            border: 1px solid var(--border);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255, 107, 129, 0.4));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo h1 {
            font-family: 'Quicksand', sans-serif;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(to right, #70A1FF, #FF6B81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: var(--text2);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid var(--surface2);
            border-radius: 12px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--blue);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(30, 144, 255, 0.1);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 144, 255, 0.3);
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 144, 255, 0.5);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .extra-links {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
        }

        .extra-links a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .extra-links a:hover {
            color: var(--pink);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 600;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider::before { margin-right: 10px; }
        .divider::after { margin-left: 10px; }

        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: var(--surface2);
            transform: translateY(-2px);
        }

        /* Abstract background elements */
        .bg-shape {
            position: absolute;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.5;
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: var(--purple);
            top: -100px;
            right: -100px;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--blue);
            bottom: -150px;
            left: -150px;
            animation-delay: -4s;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.6; }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                border-radius: 20px;
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-container">
        <div class="logo">
            <span class="logo-icon">✨</span>
            <h1>CyberShield</h1>
            <p>Ecosystem Access Portal</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Agent ID / Email</label>
                <input type="text" id="username" class="form-control" placeholder="Enter your credentials" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="password">Passkey</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Secure Login 🚀</button>
        </form>

        <div class="divider">OR SECURE LOGIN WITH</div>

        <div class="social-login">
            <button type="button" class="social-btn">
                <span>Google</span>
            </button>
            <button type="button" class="social-btn">
                <span>GitHub</span>
            </button>
        </div>

        <div class="extra-links">
            <p>New recruit? <a href="#">Create an account</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Dummy login logic - Add a small delay for "authenticating" effect
            const btn = document.querySelector('.login-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Authenticating... ⏳';
            btn.style.opacity = '0.8';
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                btn.innerHTML = 'Access Granted ✅';
                btn.style.background = 'linear-gradient(135deg, #2ED573, #27ae60)';
                
                // Redirect to the main hub
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 600);
            }, 1200);
        });

        // Dummy social login
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const originalText = this.innerHTML;
                this.innerHTML = 'Connecting...';
                
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            });
        });
    </script>
</body>
</html>
