<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>CyberShield Academy Mobile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet">

  <style>
    /* --- MOBILE-FIRST VARIABLES & RESET --- */
    :root {
      --bg: #0B0E14;
      --bg-dark: #07090D;
      --panel: #151A23;
      --panel-solid: #1C2331;
      --panel-light: rgba(255, 255, 255, 0.05);

      --accent-cyan: #00e5ff;
      --accent-violet: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #f59e0b;
      --accent-red: #ef4444;

      --text: #f8fafc;
      --text-dim: #94a3b8;

      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(0, 229, 255, 0.3);

      --glass: blur(12px);
      --shadow-premium: 0 8px 30px rgba(0, 0, 0, 0.2);

      --header-h: 70px;
      --nav-h: 80px;
      --pad: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html,
    body {
      color: var(--text);
      font-family: 'Nunito', -apple-system, sans-serif;
      background: var(--bg);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.5em;
      color: var(--text);
    }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: 0.2s;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    /* --- LAYOUT SHELL --- */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: relative;
      z-index: 10;
    }

    /* --- MOBILE HEADER --- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      padding: 0 var(--pad);
      background: rgba(11, 14, 20, 0.85);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 90;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #fff;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0, 229, 255, 0.3);
    }

    .brand .name {
      font-weight: 700;
      font-size: 18px;
      line-height: 1.2;
      font-family: 'Space Grotesk', sans-serif;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .xp-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent-cyan);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
    }

    /* --- LANGUAGE SWITCHER --- */
    .lang-switcher {
      position: relative;
    }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid rgba(139, 92, 246, 0.35);
      border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--accent-violet);
      cursor: pointer;
      white-space: nowrap;
    }

    .lang-btn .lang-arrow {
      font-size: 9px;
      transition: transform 0.2s;
    }

    .lang-btn.open .lang-arrow {
      transform: rotate(180deg);
    }

    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      z-index: 500;
      min-width: 130px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      animation: langDrop 0.15s ease;
    }

    .lang-dropdown.open {
      display: block;
    }

    @keyframes langDrop {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.15s;
    }

    .lang-option:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .lang-option.active {
      color: var(--accent-violet);
      background: rgba(139, 92, 246, 0.08);
    }

    /* --- MAIN CONTENT AREA --- */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px var(--pad) calc(var(--nav-h) + 24px);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* --- BOTTOM NAVIGATION --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      background: rgba(11, 14, 20, 0.95);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-decoration: none;
      width: 25%;
      height: 100%;
      gap: 4px;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--accent-cyan);
    }

    .nav-item .ico {
      font-size: 24px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .nav-item.active .ico {
      transform: translateY(-4px) scale(1.1);
    }

    .nav-item .lbl {
      font-size: 11px;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* --- CARDS & UI COMPONENTS --- */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .hero {
      padding: 24px;
      border-radius: 24px;
      margin-bottom: 24px;
      background: linear-gradient(145deg, #1A1F35, #0B0E14);
      border: 1px solid rgba(0, 229, 255, 0.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .swipe-grid {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 16px;
      margin-right: calc(var(--pad) * -1);
      padding-right: var(--pad);
      scrollbar-width: none;
    }

    .stat {
      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      min-width: 140px;
      flex-shrink: 0;
      scroll-snap-align: start;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat .v {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .stat .l {
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .course-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .course-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 28px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .badge.beg {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .badge.int {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent-gold);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .badge.adv {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .btn {
      padding: 16px 20px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      color: #fff;
      border: none;
      width: 100%;
      min-height: 52px;
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
      transition: transform 0.1s;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn.ghost {
      background: var(--panel-solid);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .progress {
      height: 8px;
      background: var(--bg-dark);
      border-radius: 4px;
      overflow: hidden;
      margin: 12px 0;
    }

    .progress div {
      height: 100%;
      background: var(--accent-cyan);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input,
    .field textarea {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      outline: none;
      width: 100%;
      min-height: 52px;
      font-weight: 600;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent-cyan);
    }

    /* ===== VIDEO THUMBNAIL PLAYER (REPLACES IFRAME) ===== */
    .yt-thumb-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #000;
      margin-bottom: 16px;
      cursor: pointer;
    }

    .yt-thumb-wrap img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      display: block;
    }

    .yt-thumb-wrap .yt-play-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 72px;
      height: 72px;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: background 0.2s, transform 0.2s;
    }

    .yt-thumb-wrap:hover .yt-play-btn,
    .yt-thumb-wrap:active .yt-play-btn {
      background: #ff0000;
      transform: translate(-50%, -50%) scale(1.08);
    }

    .yt-thumb-wrap .yt-play-btn svg {
      width: 32px;
      height: 32px;
      fill: #fff;
      margin-left: 4px;
    }

    .yt-thumb-wrap .yt-label {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      padding: 0 16px;
    }

    /* Once user taps, replace thumb with live iframe */
    .yt-thumb-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 16px;
    }

    /* Exam Cards (Touch Optimized) */
    .q-card {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      background: var(--panel);
    }

    .q-card.correct {
      border-color: var(--accent-green);
      background: rgba(16, 185, 129, 0.05);
    }

    .q-card.wrong {
      border-color: var(--accent-red);
      background: rgba(239, 68, 68, 0.05);
    }

    /* Modals */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: var(--pad);
    }

    .modal .box {
      width: 100%;
      max-width: 400px;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-premium);
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    #certCanvas {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-cyan);
      color: #000;
      padding: 12px 24px;
      border-radius: 24px;
      font-weight: 800;
      font-size: 14px;
      z-index: 2000;
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, -20px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>

    const LEVELS = ["Rookie", "Script Kiddie", "Security Analyst", "Ethical Hacker", "Cyber Ninja", "Elite Defender"];
    function levelFor(xp) { return LEVELS[Math.min(LEVELS.length - 1, Math.floor(xp / 300))] }


    /* ============================ STATE ============================ */
    const LS = "csa_state_mobile_v1";
    let state = JSON.parse(localStorage.getItem(LS) || "null") || {};
    state.user = state.user || { name: "Cyber Guardian", email: "guardian@cyber.io", bio: "Defending the digital realm." };
    state.xp = state.xp || 0;
    state.streak = state.streak || 0;
    state.lastDay = state.lastDay || new Date().toDateString();
    state.enrolled = state.enrolled || {};
    state.completed = state.completed || {};
    state.quizzes = state.quizzes || [];
    state.certificates = state.certificates || [];
    state.badges = state.badges || [];
    state.studyMins = state.studyMins || [40, 55, 30, 80, 60, 90, 45];
    state.scoreTrend = state.scoreTrend || [];

    if (state.reducedMotion === undefined) state.reducedMotion = false;

    function save() { localStorage.setItem(LS, JSON.stringify(state)) }
    function awardXP(n) { state.xp += n; updateStreak(); save(); toast("+" + n + " XP") }
    function updateStreak() {
      const t = new Date().toDateString();
      if (state.lastDay === t) return;
      const y = new Date(Date.now() - 86400000).toDateString();
      state.streak = (state.lastDay === y) ? state.streak + 1 : 1;
      state.lastDay = t;
    }
    function addBadge(b) { if (!state.badges.includes(b)) { state.badges.push(b); toast("🏆 Badge: " + b) } save() }

    /* ============================ UTIL ============================ */
    function $(s, r = document) { return r.querySelector(s) }
    function el(t, a = {}, ...c) { const e = document.createElement(t); for (const k in a) { if (k === "class") e.className = a[k]; else if (k.startsWith("on")) e[k.toLowerCase()] = a[k]; else e.setAttribute(k, a[k]) } c.flat().forEach(x => e.append(x?.nodeType ? x : document.createTextNode(x ?? ""))); return e }
    function toast(msg) { const t = el("div", { class: "toast" }, msg); document.body.append(t); setTimeout(() => t.remove(), 2000) }
    function initials(n) { if (!n) return "??"; return n.split(" ").filter(Boolean).map(x => x[0]).slice(0, 2).join("").toUpperCase() }

    /* ============================ ROUTER ============================ */
    const routes = {};
    function route(p, fn) { routes[p] = fn }
    function go(p) {
      if (location.hash === "#" + p || location.hash === p) render();
      else location.hash = p;
    }
    window.addEventListener("hashchange", render);
    function render() {
      try {
        const h = location.hash.replace("#", "") || "/dashboard";
        const [base, ...rest] = h.split("/").filter(Boolean);
        const fn = routes["/" + base] || routes["/dashboard"];
        const app = $("#app");
        if (!app) return;
        app.innerHTML = "";

        if (state.user) {
          app.append(shell());
          const target = $("#main");
          if (target && fn) target.append(fn(rest));

          document.querySelectorAll(".bottom-nav .nav-item").forEach(a => {
            a.classList.toggle("active", a.dataset.r === base);
          });
        }
      } catch (e) {
        console.error("Render error:", e);
      }
    }

    /* ============================ SHELL ============================ */
    function shell() {
      const wrap = document.createDocumentFragment();

      /* --- Language Switcher Widget --- */
      const LANG_OPTIONS = [
        { code: "en", flag: "🇬🇧", label: "English" },
        { code: "hi", flag: "🇮🇳", label: "हिन्दी" },
        { code: "kn", flag: "🇮🇳", label: "ಕನ್ನಡ" }
      ];
      const activeLang = LANG_OPTIONS.find(l => l.code === currentLang) || LANG_OPTIONS[0];

      const langDropdown = el("div", { class: "lang-dropdown" });
      LANG_OPTIONS.forEach(opt => {
        const item = el("div", { class: "lang-option" + (opt.code === currentLang ? " active" : "") },
          el("span", {}, opt.flag + " " + opt.label)
        );
        item.onclick = (e) => {
          e.stopPropagation();
          setLang(opt.code);
        };
        langDropdown.append(item);
      });

      const langBtn = el("button", { class: "lang-btn" },
        el("span", {}, activeLang.flag + " " + activeLang.label),
        el("span", { class: "lang-arrow" }, "▾")
      );
      langBtn.onclick = (e) => {
        e.stopPropagation();
        const isOpen = langDropdown.classList.toggle("open");
        langBtn.classList.toggle("open", isOpen);
      };
      document.addEventListener("click", () => {
        langDropdown.classList.remove("open");
        langBtn.classList.remove("open");
      });

      const langSwitcher = el("div", { class: "lang-switcher" });
      langSwitcher.append(langBtn, langDropdown);
      /* --- End Language Switcher --- */

      const top = el("header", { class: "topbar" },
        el("div", { style: "display:flex; align-items:center; gap:12px;" },
          el("a", { href: "index.html", style: "color:var(--text); text-decoration:none; font-size:24px; display:flex; align-items:center; opacity:0.8;", title: "Back to Hub" }, "←"),
          el("div", { class: "brand" },
            el("div", { class: "logo" }, "CS"),
            el("div", { class: "name" }, "CyberShield")
          )
        ),
        el("div", { class: "topbar-right" },
          langSwitcher,
          el("div", { class: "xp-pill" },
            el("span", { style: "font-size:1.2em" }, "⚡"),
            state.xp + " XP"
          ),
          el("div", { class: "avatar", onclick: () => go("/profile") }, initials(state.user.name))
        )
      );

      const main = el("main", { id: "main" });

      const bnav = el("nav", { class: "bottom-nav" },
        navL("dashboard", "🏠", T("nav_command")),
        navL("courses", "🛡️", T("nav_catalog")),
        navL("learning", "🎯", T("nav_missions")),
        navL("profile", "👤", T("nav_profile"))
      );

      wrap.append(top, main, bnav);
      return wrap;
    }

    function navL(r, i, t) { return el("a", { href: "#" + r, "data-r": r, class: "nav-item" }, el("span", { class: "ico" }, i), el("span", { class: "lbl" }, t)) }

    function field(name, label, type, ph) {

      const done = Object.keys(state.completed[c.id] || {}).length;
      const pct = Math.round(done / 10 * 100);
      const dcl = c.diff === "Beginner" ? "beg" : c.diff === "Intermediate" ? "int" : "adv";

      return el("div", { class: "card course-card" },
        el("div", { style: "display:flex; justify-content:space-between; align-items:flex-start" },

          el("button", {
            class: "btn", style: "margin-top:16px;", onclick: () => {

    /* ============================ VIDEO THUMBNAIL PLAYER ============================ */
    /*
      FIX: YouTube iframes are blocked on custom/local domains due to X-Frame-Options.
      Solution: Show a clickable YouTube thumbnail. On tap, open YouTube directly
      (or replace with live iframe for hosts that support embedding).
    */
    function makeThumbnailPlayer(ytId, chTitle) {
      // YouTube thumbnail URLs (hqdefault is always available)
      const thumbUrl = `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
      const ytUrl = `https://www.youtube.com/watch?v=${ytId}`;

      const wrap = el("div", { class: "yt-thumb-wrap" });

      const img = el("img", { src: thumbUrl, alt: chTitle, loading: "lazy" });

      const playBtn = el("div", { class: "yt-play-btn" });
      playBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;

      const label = el("div", { class: "yt-label" }, "▶ Watch on YouTube • " + chTitle);

      wrap.append(img, playBtn, label);

      // On tap: try to load inline iframe first; if that fails, open YouTube
      wrap.onclick = () => {
        // Remove thumbnail elements
        wrap.innerHTML = "";
        // Insert live iframe
        const iframe = document.createElement("iframe");
        iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1`;
        iframe.setAttribute("frameborder", "0");
        iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture");
        iframe.setAttribute("allowfullscreen", "true");
        iframe.setAttribute("referrerpolicy", "strict-origin-when-cross-origin");
        // iframe errors are silent; add onerror fallback by checking load
        iframe.onload = () => {
          // If iframe loaded but is blank (blocked), show fallback button
          try {
            // Will throw cross-origin error only if truly loaded & accessible — safe to ignore
          } catch (e) { }
        };
        wrap.appendChild(iframe);

        // Fallback: also show a "Open in YouTube" button below
        const fallbackBtn = document.createElement("a");
        fallbackBtn.href = ytUrl;
        fallbackBtn.target = "_blank";
        fallbackBtn.rel = "noopener noreferrer";
        fallbackBtn.style.cssText = "display:block; margin-top:12px; text-align:center; color:var(--accent-cyan); font-weight:800; font-size:14px; padding:12px; background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); border-radius:12px; text-decoration:none;";
        fallbackBtn.textContent = "🔗 Can't see video? Open in YouTube ↗";
        // Insert after the thumb wrap's parent container
        wrap.parentElement && wrap.parentElement.insertBefore(fallbackBtn, wrap.nextSibling);
      };

      return wrap;
    }

    /* ============================ QUIZ (BUG FIXED) ============================ */
    /*
      BUG FIX: The original code did:
        e.currentTarget.parentElement.style.pointerEvents = "none";
      When 'parentElement' was the modal `.box`, this disabled ALL clicks in the modal,
      causing question 2 onwards to be unresponsive.

      FIX: We wrap the answer options in a dedicated container div and disable
      pointer events on THAT container only, not on the whole box.
    */
    function openQuiz(c, ch, idx, chapters) {
      const bank = QUIZBANK[c.id] || QUIZBANK["sec+"];
      let i = 0, score = 0, timeLeft = 60;

      const modal = el("div", { class: "modal" });
      const box = el("div", { class: "box" });
      modal.append(box);
      document.body.append(modal);

      let timer = setInterval(() => {
        timeLeft--;
        const tm = $("#tm");
        if (tm) tm.textContent = "⏱ " + timeLeft + "s";
        if (timeLeft <= 0) { clearInterval(timer); finish() }
      }, 1000);

      function showQ() {
        if (i >= bank.length) return finish();
        const q = bank[i];
        box.innerHTML = "";

        // Header row
        box.append(
          el("div", { style: "display:flex;justify-content:space-between;align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border)" },
            el("h3", { style: "margin:0; font-size:18px;" }, T("assessment_phase")),
            el("div", { style: "display:flex; gap:16px; align-items:center" },
              el("span", { style: "font-family:'Space Grotesk'; color:var(--text-dim); font-size:14px" }, (i + 1) + "/" + bank.length),
              el("span", { id: "tm", style: "color:var(--accent-red); font-weight:800; font-size:14px;" }, "⏱ " + timeLeft + "s")
            )
          ),
          el("div", { style: "font-size:18px; line-height:1.4; margin-bottom:24px; font-weight:600" }, q.q)
        );

        // *** FIX: dedicated options container — only THIS gets pointerEvents disabled ***
        const optionsContainer = el("div", { style: "display:flex; flex-direction:column; gap:12px;" });

        q.a.forEach((opt, k) => {
          const optCard = el("div", {
            class: "q-card q",
            style: "cursor:pointer; margin-bottom:0;",
            onclick: (e) => {
              if (k === q.c) {
                optCard.classList.add("correct");
                score++;
              } else {
                optCard.classList.add("wrong");
                // Also highlight the correct answer
                const allCards = optionsContainer.querySelectorAll(".q-card");
                if (allCards[q.c]) allCards[q.c].classList.add("correct");
              }
              // Disable ONLY the options container, NOT the whole box
              optionsContainer.style.pointerEvents = "none";
              setTimeout(() => { i++; showQ(); }, 800);
            }
          },
            el("div", { style: "display:flex; gap:16px; align-items:center;" },
              el("div", { style: "width:36px; height:36px; border-radius:10px; background:var(--bg-dark); display:grid; place-items:center; font-family:'Space Grotesk'; font-weight:800; color:var(--text-dim); flex-shrink:0;" }, String.fromCharCode(65 + k)),
              el("span", { style: "font-size:16px; font-weight:600;" }, opt)
            )
          );
          optionsContainer.append(optCard);
        });

        box.append(optionsContainer);
      }

      function finish() {
        clearInterval(timer);
        state.completed[c.id] = state.completed[c.id] || {};
        state.completed[c.id][ch.id] = true;
        state.quizzes.push({ course: c.id, ch: ch.id, score, date: Date.now() });
        state.scoreTrend.push(score);
        awardXP(25);
        if (state.completed[c.id] && Object.keys(state.completed[c.id]).length === 1) addBadge("First Blood");
        if (state.quizzes.length >= 5) addBadge("Quiz Master");
        if (state.streak >= 7) addBadge("No Sleep");
        save();

        box.innerHTML = "";
        box.append(
          el("div", { style: "text-align:center; padding:10px 0" },
            el("div", { style: "font-size:64px; margin-bottom:16px" }, score >= 3 ? "🏆" : "⚠️"),
            el("h2", { style: "font-size:24px; margin-bottom:12px;" }, score >= 3 ? T("mission_accomplished") : T("assessment_failed")),
            el("div", { style: "font-size:18px; color:var(--text-dim); font-weight:700; margin-bottom:8px" }, T("score_label") + " " + score + " / " + bank.length),
            el("div", { style: "color:var(--accent-green); font-family:'Space Grotesk'; font-size:16px; font-weight:800; margin-bottom:32px" }, T("xp_gained")),
            el("div", { style: "display:flex; flex-direction:column; gap:12px;" },
              chapters[idx + 1] ?
                el("button", { class: "btn", onclick: () => { modal.remove(); openVideo(c, chapters[idx + 1], idx + 1, chapters); } }, T("next_mission")) :
                el("button", { class: "btn", onclick: () => { modal.remove(); go("/course/" + c.id); } }, T("return_to_base")),
              el("button", { class: "btn ghost", onclick: () => modal.remove() }, T("close"))
            )
          )
        );
      }
      showQ();
    }

    function drawCert(cv, name, course, score) {
      const x = cv.getContext("2d");
      const g = x.createLinearGradient(0, 0, 800, 600); g.addColorStop(0, "#0B0E14"); g.addColorStop(1, "#151A23");
      x.fillStyle = g; x.fillRect(0, 0, 800, 600);
      x.strokeStyle = "#f59e0b"; x.lineWidth = 6; x.strokeRect(20, 20, 760, 560);
      x.lineWidth = 2; x.strokeRect(34, 34, 732, 532);

      x.fillStyle = "#f59e0b";["20,20", "780,20", "20,580", "780,580"].forEach(p => { const [a, b] = p.split(",").map(Number); x.beginPath(); x.arc(a, b, 7, 0, Math.PI * 2); x.fill() });

      x.fillStyle = "#00e5ff"; x.font = "bold 26px sans-serif"; x.textAlign = "center";
      x.fillText("CYBERSHIELD ACADEMY", 400, 100);

      x.fillStyle = "#fff"; x.font = "bold 46px sans-serif";
      x.fillText("CERTIFICATE", 400, 200);
      x.fillStyle = "#10b981"; x.font = "bold 18px sans-serif";
      x.fillText("OF ACHIEVEMENT", 400, 235);

      x.fillStyle = "#94a3b8"; x.font = "20px sans-serif";
      x.fillText("This certifies that", 400, 300);
      x.fillStyle = "#f59e0b"; x.font = "bold 42px sans-serif";
      x.fillText(name, 400, 360);

      x.fillStyle = "#94a3b8"; x.font = "20px sans-serif";
      x.fillText("has completed the certification", 400, 410);
      x.fillStyle = "#00e5ff"; x.font = "bold 28px sans-serif";
      x.fillText(course, 400, 460);

      x.fillStyle = "#94a3b8"; x.font = "18px sans-serif";
      x.fillText("with a score of " + score + "/100", 400, 500);
    }

    /* ============================ PROFILE ============================ */
    route("/profile", () => {
      const page = el("div", { class: "fade-in" });
      page.append(el("h1", { style: "font-size:28px; margin-bottom:24px;" }, T("profile_title")));
      const u = state.user;

      page.append(el("div", { class: "card", style: "display:flex; gap:20px; align-items:center" },
        el("div", { class: "avatar", style: "width:80px; height:80px; font-size:32px; flex-shrink:0; background:linear-gradient(135deg, var(--accent-cyan), var(--accent-violet)); color:#fff; border:none;" }, initials(u.name)),
        el("div", {},
          el("h3", { style: "margin:0 0 4px; font-size:22px;" }, u.name),
          el("div", { style: "color:var(--text-dim); font-size:14px; font-weight:600; margin-bottom:8px;" }, u.email),
          el("div", { class: "badge beg", style: "font-size:12px; padding:6px 12px;" }, T("lvl_label") + " " + levelFor(state.xp) + " • " + state.xp + " XP")
        )
      ));

      const f = el("form", {
        class: "card", style: "margin-top:16px", onsubmit: e => {
          e.preventDefault(); const fd = new FormData(e.target);
          state.user.name = fd.get("name"); state.user.email = fd.get("email"); state.user.bio = fd.get("bio"); save(); toast(T("profile_updated")); render();
        }
      });
      f.append(el("h3", { style: "font-size:20px; margin-bottom:16px;" }, T("edit_info")),
        field("name", T("name_label"), "text", ""), field("email", T("email_label"), "email", ""),
        el("div", { class: "field" }, el("label", {}, T("bio_label")), el("textarea", { name: "bio", style: "min-height:100px; background:var(--bg-dark); border:1px solid var(--border); padding:16px; border-radius:12px; color:#fff; outline:none;" }, u.bio || "")),
        el("button", { class: "btn", type: "submit", style: "margin-top:10px;" }, T("save_changes")));

      setTimeout(() => {
        const nn = f.querySelector('[name="name"]'); if (nn) nn.value = u.name || "";
        const ne = f.querySelector('[name="email"]'); if (ne) ne.value = u.email || "";
        const nb = f.querySelector('[name="bio"]'); if (nb) nb.value = u.bio || "";
      }, 0);
      page.append(f);

      page.append(el("div", { class: "card", style: "margin-top:16px" },
        el("h3", { style: "font-size:20px; margin-bottom:16px;" }, T("data_mgmt")),
        el("p", { style: "font-size:14px; color:var(--text-dim); margin-bottom:16px; font-weight:600; line-height:1.5;" }, T("data_stored")),
        el("button", { class: "btn", style: "background:var(--panel-solid); color:var(--accent-red); border:1px solid rgba(239, 68, 68, 0.3); box-shadow:none;", onclick: () => { if (confirm(T("erase_confirm"))) { localStorage.removeItem(LS); location.reload() } } }, T("reset_progress"))
      ));
      return page;
    });

    /* ============================ RADAR CHART ============================ */
    function drawRadar(cv) {
      if (!cv) return;
      const x = cv.getContext("2d"), W = cv.width, H = cv.height, cx = W / 2, cy = H / 2, r = Math.min(W, H) / 2 - 30;
      const labels = ["Net", "Crypt", "Web", "Cloud", "IR"];
      const vals = [0.7, 0.55, 0.8, 0.65, 0.6].map(v => v * (0.5 + Math.min(1, state.xp / 1000) * 0.5));
      x.clearRect(0, 0, W, H);

      for (let g = 1; g <= 4; g++) {
        x.strokeStyle = "rgba(255,255,255,0.05)"; x.beginPath();
        for (let i = 0; i < labels.length; i++) { const a = Math.PI * 2 / labels.length * i - Math.PI / 2; const px = cx + Math.cos(a) * r * g / 4, py = cy + Math.sin(a) * r * g / 4; i ? x.lineTo(px, py) : x.moveTo(px, py) }
        x.closePath(); x.stroke();
      }

      x.beginPath();
      for (let i = 0; i < labels.length; i++) { const a = Math.PI * 2 / labels.length * i - Math.PI / 2; const px = cx + Math.cos(a) * r * vals[i], py = cy + Math.sin(a) * r * vals[i]; i ? x.lineTo(px, py) : x.moveTo(px, py) }
      x.closePath();

      x.fillStyle = "rgba(0, 229, 255, 0.2)"; x.fill();
      x.strokeStyle = "#00e5ff"; x.lineWidth = 2; x.stroke();

      x.fillStyle = "#94a3b8"; x.font = "600 12px sans-serif"; x.textAlign = "center";
      for (let i = 0; i < labels.length; i++) { const a = Math.PI * 2 / labels.length * i - Math.PI / 2; x.fillText(labels[i], cx + Math.cos(a) * (r + 15), cy + Math.sin(a) * (r + 15) + 4) }
    }

    /* ============================ START ============================ */
    render();
  </script>
