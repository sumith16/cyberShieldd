<!DOCTYPE html>
<html lang="en">

<head>
   
  <meta charset="UTF-8" />
   
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
   
  <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>CyberShield Academy Mobile</title>
   
  <link rel="preconnect" href="https://fonts.googleapis.com">
   
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   
  <link    
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
   
  <script src="https://www.youtube.com/iframe_api"></script>
    <style>
    /* --- MOBILE-FIRST VARIABLES & RESET --- */
    :root {
      --bg: #0B0E14;
      --bg-dark: #07090D;
      --panel: #151A23;
      --panel-solid: #1C2331;
      --panel-light: rgba(255, 255, 255, 0.05);

      --accent-cyan: #00e5ff;
      --accent-violet: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #f59e0b;
      --accent-red: #ef4444;

      --text: #f8fafc;
      --text-dim: #94a3b8;

      --border: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(0, 229, 255, 0.3);

      --glass: blur(12px);
      --shadow-premium: 0 8px 30px rgba(0, 0, 0, 0.2);

      --header-h: 70px;
      --nav-h: 80px;
      --pad: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html,
    body {
      color: var(--text);
      font-family: 'Nunito', -apple-system, sans-serif;
      background: var(--bg);
      overflow: hidden;
      /* App Shell controls scroll */
      height: 100vh;
      width: 100vw;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.5em;
      color: var(--text);
    }

    a {
      color: var(--accent-cyan);
      text-decoration: none;
      transition: 0.2s;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    /* Hide scrollbars for app feel */

    /* --- LAYOUT SHELL --- */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      position: relative;
      z-index: 10;
    }

    /* --- MOBILE HEADER --- */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-h);
      padding: 0 var(--pad);
      background: rgba(11, 14, 20, 0.85);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 90;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #fff;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0, 229, 255, 0.3);
    }

    .brand .name {
      font-weight: 700;
      font-size: 18px;
      line-height: 1.2;
      font-family: 'Space Grotesk', sans-serif;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .xp-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--accent-cyan);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
    }

    /* --- MAIN CONTENT AREA --- */
    main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px var(--pad) calc(var(--nav-h) + 24px);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* --- BOTTOM NAVIGATION --- */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      background: rgba(11, 14, 20, 0.95);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-decoration: none;
      width: 25%;
      /* Adjusted to 25% since we have 4 icons now */
      height: 100%;
      gap: 4px;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--accent-cyan);
    }

    .nav-item .ico {
      font-size: 24px;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .nav-item.active .ico {
      transform: translateY(-4px) scale(1.1);
    }

    .nav-item .lbl {
      font-size: 11px;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* --- CARDS & UI COMPONENTS --- */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .hero {
      padding: 24px;
      border-radius: 24px;
      margin-bottom: 24px;
      background: linear-gradient(145deg, #1A1F35, #0B0E14);
      border: 1px solid rgba(0, 229, 255, 0.2);
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Swipeable Horizontal Grid for Stats */
    .swipe-grid {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 16px;
      margin-right: calc(var(--pad) * -1);
      padding-right: var(--pad);
      scrollbar-width: none;
    }

    .stat {
      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      min-width: 140px;
      flex-shrink: 0;
      scroll-snap-align: start;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat .v {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .stat .l {
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Vertical Standard Grid */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .course-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .course-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      font-size: 28px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .badge.beg {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .badge.int {
      background: rgba(245, 158, 11, 0.1);
      color: var(--accent-gold);
      border: 1px solid rgba(245, 158, 11, 0.2);
    }

    .badge.adv {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Touch-Friendly Buttons */
    .btn {
      padding: 16px 20px;
      border-radius: 16px;
      font-weight: 800;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      color: #fff;
      border: none;
      width: 100%;
      min-height: 52px;
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
      transition: transform 0.1s;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn.ghost {
      background: var(--panel-solid);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .progress {
      height: 8px;
      background: var(--bg-dark);
      border-radius: 4px;
      overflow: hidden;
      margin: 12px 0;
    }

    .progress div {
      height: 100%;
      background: var(--accent-cyan);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Forms */
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-weight: 700;
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input,
    .field textarea {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      /* 16px prevents iOS zoom */
      outline: none;
      width: 100%;
      min-height: 52px;
      font-weight: 600;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent-cyan);
    }

    /* Video Player */
    .iframe-box {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: #000;
      margin-bottom: 16px;
    }

    .iframe-box iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Exam Cards (Touch Optimized) */
    .q-card {
      margin-bottom: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      background: var(--panel);
    }

    .q-card.correct {
      border-color: var(--accent-green);
      background: rgba(16, 185, 129, 0.05);
    }

    .q-card.wrong {
      border-color: var(--accent-red);
      background: rgba(239, 68, 68, 0.05);
    }

    /* Modals */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: var(--pad);
    }

    .modal .box {
      width: 100%;
      max-width: 400px;
      background: var(--panel-solid);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-premium);
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 90vh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Certificate Canvas Fix for Mobile */
    #certCanvas {
      width: 100%;
      max-width: 800px;
      height: auto;
      border-radius: 12px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-cyan);
      color: #000;
      padding: 12px 24px;
      border-radius: 24px;
      font-weight: 800;
      font-size: 14px;
      z-index: 2000;
      box-shadow: 0 4px 15px rgba(0, 229, 255, 0.4);
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translate(-50%, -20px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>

    function makeChapters(courseTitle) {

    const FINAL_EXAM_QUESTIONS = [

    if (state.reducedMotion === undefined) state.reducedMotion = false;

    function save() { localStorage.setItem(LS, JSON.stringify(state)) }
    function awardXP(n) { state.xp += n; updateStreak(); save(); toast("+" + n + " XP") }
    function updateStreak() {
      const t = new Date().toDateString();
      if (state.lastDay === t) return;
      const y = new Date(Date.now() - 86400000).toDateString();
      state.streak = (state.lastDay === y) ? state.streak + 1 : 1;
      state.lastDay = t;
    }
    function addBadge(b) { if (!state.badges.includes(b)) { state.badges.push(b); toast("🏆 Badge: " + b) } save() }

    function $(s, r = document) { return r.querySelector(s) }
    function el(t, a = {}, ...c) { const e = document.createElement(t); for (const k in a) { if (k === "class") e.className = a[k]; else if (k.startsWith("on")) e[k.toLowerCase()] = a[k]; else e.setAttribute(k, a[k]) } c.flat().forEach(x => e.append(x?.nodeType ? x : document.createTextNode(x ?? ""))); return e }
    function toast(msg) { const t = el("div", { class: "toast" }, msg); document.body.append(t); setTimeout(() => t.remove(), 2000) }
    function initials(n) { if (!n) return "??"; return n.split(" ").filter(Boolean).map(x => x[0]).slice(0, 2).join("").toUpperCase() }

    /* ============================ ROUTER ============================ */
    const routes = {};
    function route(p, fn) { routes[p] = fn }
    function go(p) {
      if (location.hash === "#" + p || location.hash === p) render();
      else location.hash = p;
    }
    window.addEventListener("hashchange", render);
    function render() {
      try {
        const h = location.hash.replace("#", "") || "/dashboard";
        const [base, ...rest] = h.split("/").filter(Boolean);
        const fn = routes["/" + base] || routes["/dashboard"];
        const app = $("#app");
        if (!app) return;
        app.innerHTML = "";

        if (state.user) {
          app.append(shell());
          const target = $("#main");
          if (target && fn) target.append(fn(rest));

          // Update Active Bottom Nav
          document.querySelectorAll(".bottom-nav .nav-item").forEach(a => {
            a.classList.toggle("active", a.dataset.r === base);
          });
        }
      } catch (e) {
        console.error("Render error:", e);
      }
    }

      wrap.append(top, main, bnav);

    function drawCert(cv, name, course, score) {
      const x = cv.getContext("2d");
      const g = x.createLinearGradient(0, 0, 800, 600); g.addColorStop(0, "#0B0E14"); g.addColorStop(1, "#151A23");
      x.fillStyle = g; x.fillRect(0, 0, 800, 600);
      x.strokeStyle = "#f59e0b"; x.lineWidth = 6; x.strokeRect(20, 20, 760, 560);
      x.lineWidth = 2; x.strokeRect(34, 34, 732, 532);

      x.fillStyle = "#f59e0b";["20,20", "780,20", "20,580", "780,580"].forEach(p => { const [a, b] = p.split(",").map(Number); x.beginPath(); x.arc(a, b, 7, 0, Math.PI * 2); x.fill() });

      x.fillStyle = "#00e5ff"; x.font = "bold 26px sans-serif"; x.textAlign = "center";
      x.fillText("CYBERSHIELD ACADEMY", 400, 100);

      x.fillStyle = "#fff"; x.font = "bold 46px sans-serif";
      x.fillText("CERTIFICATE", 400, 200);
      x.fillStyle = "#10b981"; x.font = "bold 18px sans-serif";
      x.fillText("OF ACHIEVEMENT", 400, 235);

      x.fillStyle = "#94a3b8"; x.font = "20px sans-serif";
      x.fillText("This certifies that", 400, 300);
      x.fillStyle = "#f59e0b"; x.font = "bold 42px sans-serif";
      x.fillText(name, 400, 360);

      x.fillStyle = "#94a3b8"; x.font = "20px sans-serif";
      x.fillText("has completed the certification", 400, 410);
      x.fillStyle = "#00e5ff"; x.font = "bold 28px sans-serif";
      x.fillText(course, 400, 460);

      x.fillStyle = "#94a3b8"; x.font = "18px sans-serif";
      x.fillText("with a score of " + score + "/100", 400, 500);
    }

    /* ============================ RADAR CHART (Mobile Optimized) ============================ */
    function drawRadar(cv) {
      if (!cv) return;
      const x = cv.getContext("2d"), W = cv.width, H = cv.height, cx = W / 2, cy = H / 2, r = Math.min(W, H) / 2 - 30;
      const labels = ["Net", "Crypt", "Web", "Cloud", "IR"];
      const vals = [0.7, 0.55, 0.8, 0.65, 0.6].map(v => v * (0.5 + Math.min(1, state.xp / 1000) * 0.5));
      x.clearRect(0, 0, W, H);

      for (let g = 1; g <= 4; g++) {
        x.strokeStyle = "rgba(255,255,255,0.05)"; x.beginPath();
        for (let i = 0; i < labels.length; i++) { const a = Math.PI * 2 / labels.length * i - Math.PI / 2; const px = cx + Math.cos(a) * r * g / 4, py = cy + Math.sin(a) * r * g / 4; i ? x.lineTo(px, py) : x.moveTo(px, py) }
        x.closePath(); x.stroke();
      }

      x.beginPath();
      for (let i = 0; i < labels.length; i++) { const a = Math.PI * 2 / labels.length * i - Math.PI / 2; const px = cx + Math.cos(a) * r * vals[i], py = cy + Math.sin(a) * r * vals[i]; i ? x.lineTo(px, py) : x.moveTo(px, py) }
      x.closePath();

      x.fillStyle = "rgba(0, 229, 255, 0.2)"; x.fill();
      x.strokeStyle = "#00e5ff"; x.lineWidth = 2; x.stroke();

      x.fillStyle = "#94a3b8"; x.font = "600 12px sans-serif"; x.textAlign = "center";
      for (let i = 0; i < labels.length; i++) { const a = Math.PI * 2 / labels.length * i - Math.PI / 2; x.fillText(labels[i], cx + Math.cos(a) * (r + 15), cy + Math.sin(a) * (r + 15) + 4) }
    }

    /* ============================ START ============================ */
    render();
  </script>
</body>
